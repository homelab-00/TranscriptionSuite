# Vulkan sidecar overlay — whisper.cpp with Vulkan GPU acceleration.
# Adds a whisper-server sidecar container for AMD/Intel GPU transcription.
#
# On Linux the main container uses host networking, so Docker DNS is unavailable.
# The port mapping below exposes whisper-server on localhost:8080 for the main
# container to reach. On Windows/macOS (bridge networking), Docker DNS resolves
# "whisper-server" and the port mapping is harmless.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.linux-host.yml -f docker-compose.vulkan.yml up -d
#
# --- GH-62 review follow-ups (deferred, not blocking the parser fix) -------
# TODO(GH-62-followup #A): the sidecar now uses our own no-AVX2 rebuild
#   (``ghcr.io/loukas-pap/whisper-cpp-vulkan-noavx2``, built from
#   whispercpp-vulkan-noavx2.Dockerfile) instead of the upstream image, so we
#   control when it changes. The ``:latest`` tag is still mutable, though — a
#   rebuild that picked up a whisper.cpp response-schema change (e.g.
#   ``start`` → ``t0``) would silently corrupt timestamps with only a warning.
#   Pin a SHA digest here (and in dockerManager.ts::VULKAN_SIDECAR_IMAGE) or add
#   a schema-probe at backend load time.
# NOTE(GH-62-followup #B / GH-101): The ``devices: /dev/dri`` mount below is
#   Linux-only. Docker Desktop on Windows/macOS runs containers in a Linux VM
#   without /dev/dri passthrough, so this overlay cannot work there at all
#   today. The host-side guard in dashboard/electron/dockerManager.ts
#   (checkVulkanSupport) is the primary protection — it blocks Start Server
#   on non-Linux platforms (and on Linux without a DRI render node) before
#   Docker is invoked, surfacing an actionable error instead of the cryptic
#   "error gathering device information" daemon error.
# NOTE(GH-62-followup #C): the healthcheck shells out to ``curl``. This is now
#   guaranteed — our whispercpp-vulkan-noavx2.Dockerfile installs ``curl`` in
#   the runtime stage explicitly — so the cross-rebuild fragility that applied
#   to the upstream image no longer holds. (A tool-agnostic probe such as
#   ``bash -c 'exec 3<>/dev/tcp/localhost/8080'`` would still remove the
#   dependency entirely if ever desired.)
# TODO(GH-62-followup #D): the model-wait retry loop sleeps 10s × 180 =
#   30 min and exits 1, after which ``restart: unless-stopped`` restarts
#   it immediately. On a permanently-missing model this floods logs.
#   Add exponential backoff, or switch ``depends_on`` to
#   ``condition: service_healthy`` so the main container waits properly.
# TODO(GH-62-followup #E): the ``huggingface-models`` volume is mounted
#   read-only on the sidecar but writable from the main container, and the
#   sidecar loads the GGML file without hash verification — a compromised
#   main container could swap the model. Add SHA-256 verification either
#   at download time (dockerManager) or at load time (sidecar entrypoint).
# TODO(GH-62-followup #F): ``WHISPER_MODEL`` env is fixed at container
#   start but the dashboard lets the user switch models via the Python
#   ``/load`` endpoint — some whisper.cpp versions ignore the POST and keep
#   serving the env-selected model. Verify the served model matches the
#   requested one and restart the sidecar on mismatch.

services:
  whisper-server:
    # Custom no-AVX2 rebuild of whisper.cpp's main-vulkan sidecar (built from
    # whispercpp-vulkan-noavx2.Dockerfile). Lowers the CPU instruction baseline
    # to AVX+F16C so the CPU-side ops don't SIGILL on pre-Haswell CPUs (e.g.
    # Ivy Bridge), while the GPU does the heavy lifting via Vulkan. Runs on
    # modern CPUs too (AVX2 is only used for CPU fallback ops), so it replaces
    # the upstream image for all Linux Vulkan users.
    image: ghcr.io/loukas-pap/whisper-cpp-vulkan-noavx2:latest
    command:
      - >-
        n=0;
        until test -f "$$WHISPER_MODEL"; do
        n=$$((n+1));
        if [ "$$n" -ge 180 ]; then
        echo '[whisper-server] ERROR: Model $$WHISPER_MODEL not found after 30 minutes — exiting so Docker can restart.' >&2;
        exit 1;
        fi;
        echo '[whisper-server] Waiting for model $$WHISPER_MODEL to be downloaded...';
        sleep 10;
        done;
        exec whisper-server --model "$$WHISPER_MODEL" --host 0.0.0.0 --port 8080 --convert
    restart: unless-stopped
    volumes:
      - huggingface-models:/models:ro
    ports:
      - "127.0.0.1:8080:8080"
    devices:
      - /dev/dri:/dev/dri
    environment:
      - WHISPER_MODEL=${WHISPERCPP_MODEL:-/models/ggml-large-v3-turbo.bin}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  transcriptionsuite:
    depends_on:
      whisper-server:
        condition: service_started
